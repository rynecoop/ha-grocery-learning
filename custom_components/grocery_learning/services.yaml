learn_term:
  name: Learn Category Term
  description: Store a normalized phrase and route it to a category in future sorting.
  fields:
    category:
      required: true
      example: pantry
      selector:
        text:
    term:
      required: true
      example: vanilla coke
      selector:
        text:

forget_term:
  name: Forget Category Term
  description: Remove a learned term from one category or all categories.
  fields:
    category:
      required: false
      example: pantry
      selector:
        text:
    term:
      required: true
      example: vanilla coke
      selector:
        text:

sync_helpers:
  name: Sync Learned Terms To Helpers
  description: Push integration learned terms into helper entities used by YAML routing.

route_item:
  name: Route Item
  description: Route an item to a category list using learned terms and keyword routing.
  fields:
    item:
      required: true
      example: vanilla coke
      selector:
        text:
    source_list:
      required: false
      example: todo.grocery_inbox
      selector:
        text:
    remove_from_source:
      required: false
      default: false
      selector:
        boolean:
    review_on_other:
      required: false
      default: true
      selector:
        boolean:
    allow_duplicate:
      required: false
      default: false
      selector:
        boolean:
    source:
      required: false
      example: typed
      selector:
        text:

add_to_list:
  name: Add Item To Internal List
  description: Add an item directly to Local List Assist storage without depending on Home Assistant todo entities.
  fields:
    item:
      required: true
      example: paper towels
      selector:
        text:
    list_name:
      required: false
      example: Costco List
      selector:
        text:
    list_id:
      required: false
      example: costco_list
      selector:
        text:
    source:
      required: false
      example: voice_assistant
      selector:
        text:
    allow_duplicate:
      required: false
      default: false
      selector:
        boolean:

install_voice_sentences:
  name: Install Voice Sentences
  description: Install the bundled custom sentence pack into Home Assistant so Assist can target Local List Assist directly.
  fields:
    language:
      required: false
      default: en
      example: en
      selector:
        text:

apply_review:
  name: Apply Category Review
  description: Move pending review item to a category and optionally learn the mapping.
  fields:
    category:
      required: false
      example: pantry
      selector:
        text:
    learn:
      required: false
      default: true
      selector:
        boolean:

confirm_duplicate:
  name: Confirm Duplicate Action
  description: Resolve a pending duplicate item by adding anyway or skipping.
  fields:
    decision:
      required: true
      example: add
      selector:
        select:
          options:
            - add
            - skip
